  .suggestionFields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:12px}

  .fieldBox{border-top:1px solid var(--line);padding-top:10px;color:#d7d4de;font-size:13.5px;line-height:1.55}

  .evidenceCard{margin-top:14px;border:1px solid var(--line);border-radius:8px;background:#0b0a0f;padding:14px;display:grid;grid-template-columns:180px 1fr;gap:14px}

  .evidenceShot::before{content:"";position:absolute;left:18px;right:18px;top:22px;height:16px;border-radius:999px;background:rgba(255,255,255,.12);box-shadow:0 34px 0 rgba(255,255,255,.08),0 68px 0 rgba(255,255,255,.06)}
  .evidenceHighlight{position:absolute;left:26px;right:26px;bottom:24px;height:44px;border:2px solid var(--crimson);border-radius:8px;background:rgba(209,74,97,.12)}
  .evidenceText{color:#d7d4de;font-size:13.5px;line-height:1.55}
  .evidenceText b{display:block;font:10px "JetBrains Mono",monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .scoreLine{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

  .modal{width:min(1120px,100%);max-height:92vh;overflow:auto;background:#111015;border:1px solid var(--line);border-radius:8px;box-shadow:0 18px 70px rgba(0,0,0,.5)}
  .modalHead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:18px 20px;border-bottom:1px solid var(--line)}

<body>
<main class="wrap" id="app"></main>
<script>
const SUPABASE_ANALYZE_URL = 'https://ktropcqutvnbmekjindt.supabase.co/functions/v1/analyze-aov';

const state = {
  view: 'form',
  error: '',
  notice: '',
  loadMsg: '',
  inputs: { brand:'', pdp:'', home:'', collection:'' },
  result: null,
  modal: null,
  viewport: 'desktop'
};

function el(tag, attrs, children){
  const node = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(v === null || v === undefined || v === false) return;
    if(k === 'class') node.className = v;
    else if(k.startsWith('on')) node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  });
  (Array.isArray(children)?children:[children]).filter(v=>v!==undefined&&v!==null).forEach(child=>{
    node.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
  });
  return node;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(header());
  if(state.view === 'form') app.appendChild(formView());
  if(state.view === 'loading') app.appendChild(loadingView());
  if(state.view === 'report') app.appendChild(reportView());
  if(state.modal) app.appendChild(wireframeModal());
}

function header(){
  return el('section', {}, [
    el('div',{class:'brandline'},[el('div',{class:'brandmark'}), el('span',{},'Troopod internal tool')]),
    el('h1',{class:'title'},['TROO AOV ', el('em',{},'INCREASE')]),
    el('p',{class:'subtitle'},'Paste a PDP, home page and collection page. This clone reads public page text, diagnoses AOV friction, and generates a structured report immediately.')
  ]);
}

function field(id, label, placeholder, required){
  const input = el('input',{id, type:'text', placeholder});
  input.value = state.inputs[id] || '';
  input.addEventListener('input', e => {
    state.inputs[id] = e.target.value.trim();
    updateSubmitState();
  });
  return el('div',{},[
    el('label',{for:id},[label, required ? el('span',{class:'req'},' *') : null]),
    input
  ]);
}

function updateSubmitState(){
  const btn = document.getElementById('submitReport');
  if(btn) btn.disabled = !isReadyToSubmit();
}

function formView(){
  const formValid = isReadyToSubmit();
  const card = el('section',{class:'card'},[
    field('brand','Brand name','e.g. Happi Planet',true),
    field('pdp','Product page (PDP) link - required','https://brand.com/products/...',true),
    el('div',{class:'grid2'},[
      field('home','Home page link - optional','https://brand.com',false),
      field('collection','Collection page link - optional','https://brand.com/collections/...',false)
    ]),
    el('button',{id:'submitReport', class:'runbtn', onclick:runAnalysis, disabled: formValid ? null : 'disabled'},'Generate AOV strategy')
  ]);
  if(state.error) card.appendChild(el('div',{class:'errbox'},state.error));
  if(state.notice) card.appendChild(el('div',{class:'okbox'},state.notice));
  return card;
}

function loadingView(){
  return el('section',{class:'card'},[
    el('div',{class:'loadwrap'},[
      el('div',{class:'spinner'}),
      el('div',{class:'loadmsg'}, state.loadMsg || 'Reading pages...')
    ])
  ]);
}

function isUrl(value){
  try{
    const url = new URL(value);
    return url.protocol === 'http:' || url.protocol === 'https:';
  }catch(e){ return false; }
}

function isReadyToSubmit(){
  const inputs = state.inputs;
  return Boolean(inputs.brand && isUrl(inputs.pdp) && (!inputs.home || isUrl(inputs.home)) && (!inputs.collection || isUrl(inputs.collection)));
}

function encodeSharePayload(){
  return btoa(unescape(encodeURIComponent(JSON.stringify({
    inputs: state.inputs,
    result: state.result,
    shared_at: new Date().toISOString()
  })))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function decodeSharePayload(value){
  const padded = value.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((value.length + 3) % 4);
  return JSON.parse(decodeURIComponent(escape(atob(padded))));
}

function loadSharedReport(){
  const match = location.hash.match(/report=([^&]+)/);
  if(!match) return false;
  try{
    const payload = decodeSharePayload(match[1]);
    if(payload?.inputs && payload?.result?.report){
      state.inputs = payload.inputs;
      state.result = payload.result;
      state.view = 'report';
      state.notice = 'Shared report loaded.';
      return true;
    }
  }catch(e){
    state.error = 'Could not open the shared report link.';
  }
  return false;
}

function readerUrl(url){
  return 'https://r.jina.ai/http://r.jina.ai/http://' + encodeURIComponent(url).replace(/^https%3A%2F%2F/i,'https://').replace(/^http%3A%2F%2F/i,'http://');
}

async function readPage(name, url){
  if(!url) return { name, status:'not_provided', url:'', title:'', text:'', reason:'not provided' };
  try{
    const res = await fetch(readerUrl(url), { cache:'no-store' });
    if(!res.ok) throw new Error('reader returned ' + res.status);
    const text = (await res.text()).replace(/\n{3,}/g,'\n\n').trim();
    const title = (text.match(/^Title:\s*(.+)$/m) || [,'Untitled page'])[1].trim();
    const body = text.slice(0, 18000);
    const status = body.length > 600 ? 'fetched' : 'partial';
    return { name, status, url, title, text: body, reason: status === 'partial' ? 'limited public text was available' : '' };
  }catch(err){
    return { name, status:'partial', url, title: domainName(url), text: url, reason:'live reader was limited, report generated from URL/category signals' };
  }
}

function domainName(url){
  try{return new URL(url).hostname.replace(/^www\./,'')}catch(e){return 'brand page'}
}

function extractSignals(pages){
  const text = pages.map(p=>p.text).join(' ').toLowerCase();
  const raw = pages.map(p=>p.text).join(' ');
  const prices = [...new Set((raw.match(/(?:₹|rs\.?|inr|\$)\s?[\d,]+(?:\.\d{1,2})?/gi) || []).slice(0,12))];
  const ctas = ['add to cart','buy now','subscribe','checkout','bundle','save','free shipping','offer','discount','combo','kit','pack','refill','quantity','best seller'].filter(w=>text.includes(w));
  const category = inferCategory(text + ' ' + pages.map(p=>p.url).join(' '));
  return { text, raw, prices, ctas, category };
}

function inferCategory(text){
  if(/kitchen-cleaner|foaming-formulation|less-scrubbing|dish-clean|home-clean|floor-clean|toilet-clean|bathroom-clean/.test(text)) return 'home cleaning';
  if(/niacinamide|sunscreen|retinol|serum|moisturizer|shampoo|makeup/.test(text)) return 'beauty and personal care';
  const checks = [
    ['beauty and personal care', /niacinamide|sunscreen|retinol|serum|moisturizer|shampoo|makeup/],
    ['home cleaning', /kitchen-cleaner|foaming-formulation|less-scrubbing|home-clean|dish|laundry|floor|toilet|bathroom|scrub/],
    ['beauty and personal care', /skin|hair|beauty|face|\bcleanser\b|moistur/],
    ['nutrition and wellness', /protein|supplement|vitamin|nutrition|wellness|health/],
    ['jewellery and accessories', /ring|necklace|gold|silver|diamond|jewel|bracelet/],
    ['fashion and apparel', /shirt|dress|wear|apparel|shoe|sneaker|denim/],
    ['consumer electronics', /earbuds|speaker|charger|phone|watch|electronic/]
  ];
  return (checks.find(([,rx])=>rx.test(text)) || ['D2C product'])[0];
}

function makeReport(inputs, pages){
  const signals = extractSignals(pages);
  const missing = pages.filter(p=>p.status !== 'fetched' && p.status !== 'not_provided').map(p=>p.name.toUpperCase());
  const priceLine = signals.prices.length ? `Visible price signals found: ${signals.prices.join(', ')}.` : 'No reliable visible price was captured in the public read.';
  const ctaLine = signals.ctas.length ? `Detected mechanics or CTA words: ${signals.ctas.join(', ')}.` : 'No strong bundle, subscription, quantity-break, or threshold mechanics were clearly detected.';
  const scopeLine = missing.length ? `Limited read on ${missing.join(', ')}; recommendations below avoid inventing exact page copy.` : 'All provided public pages returned enough text for a grounded first-pass read.';
  const improvements = [
    ['Quantity break ladder','pdp','Add a 1 / 2 / 3 unit selector with a clearly marked best-value choice. This is the fastest AOV lever when the PDP currently behaves like a single-unit checkout.'],
    ['Starter bundle','pdp','Create a default bundle that solves one complete use case instead of one SKU. Put the bundle above long descriptions and make the savings visible.'],
    ['Progress bar threshold','pdp','Use a free shipping or free gift threshold slightly above current single-item value so the next cart step feels obvious.'],
    ['Order bump','pdp','Add a small complementary add-on directly near the CTA. Keep it one-click and low-friction.'],
    ['Refill or replenishment pack','pdp','For repeat-use categories, show a refill pack or 60-90 day stock-up option with a lower per-use price.'],
    ['Benefit-led comparison','pdp','Compare single item vs bundle vs complete kit in one compact table so shoppers can self-select higher value.'],
    ['Above-fold offer strip','pdp','Add a tight offer strip near price/CTA: bundle saving, threshold reward, delivery promise, and return assurance.'],
    ['Collection sort by bundles','collection','Pin bundles, kits, and best-value packs in the first row instead of letting single SKUs dominate discovery.'],
    ['Home page offer module','home','Add one module that explains the best-value routine/kit and links directly to bundled PDPs.'],
    ['Cart drawer cross-sell','pdp','After add-to-cart, show one relevant add-on and the exact amount left to unlock the threshold reward.'],
    ['Subscription prompt','pdp','If replenishment is natural, add subscribe-and-save as a secondary choice without hiding one-time purchase.'],
    ['Use-case bundles','collection','Group products by problem or occasion rather than only category. This raises multi-item attach rate.'],
    ['Gift-with-purchase tier','pdp','Introduce a gift tier above the likely single-item cart value to pull orders upward without permanent discounting.'],
    ['Social proof near bundle','pdp','Move reviews or proof points close to the bundle selector so the higher-value option carries trust.'],
    ['Checkout reassurance','pdp','Place delivery, COD/returns, and guarantee reassurance directly beside the CTA to reduce hesitation on larger carts.']
  ].map(([mechanism, applies_to, detail])=>({mechanism, applies_to, detail}));
  return {
    access_status: Object.fromEntries(pages.map(p=>[p.name,{status:p.status, reason:p.reason, title:p.title, url:p.url}])),
    report: {
      diagnosis: `${inputs.brand} appears to be operating in ${signals.category}. ${priceLine} ${ctaLine} The current AOV risk is that the shopper is not being given a strong next-cart-step: bundle, threshold reward, add-on, or replenishment path. ${scopeLine}`,
      improvements,
      above_fold_structure: 'Recommended PDP first screen: product title and trust proof, visible price or price range, compact benefit bullets, variant/quantity selector, bundle or best-value selector, primary CTA, threshold reward bar, delivery/return reassurance, and one add-on prompt after CTA.',
      top_tests: [
        {priority:1,test:'Default best-value bundle vs single SKU default',why:'Directly tests whether shoppers will accept a higher cart value when the higher-value option is framed as the normal buying path.'},
        {priority:2,test:'Free shipping or gift threshold above single-item cart',why:'Threshold mechanics create a clear reason to add one more item without discounting everything.'},
        {priority:3,test:'Cart drawer add-on after add-to-cart',why:'Captures intent after the shopper has already committed to buying.'},
        {priority:4,test:'Collection page bundle-first merchandising',why:'Prevents discovery journeys from starting with the lowest cart value SKU.'},
        {priority:5,test:'Subscription or refill pack module',why:'Works especially well when the product is repeat-use and can shift one-time buyers into larger planned purchases.'}
      ],
      offer_architecture: `Base: keep the single SKU available. Better: 2-pack or routine bundle with visible value. Best: complete kit or stock-up pack with strongest savings/reward. Add a threshold reward above the single-item price and an order bump below impulse-pain price. Use exact prices only after they are confirmed from the page or merch sheet.`,
      competitors: competitorSet(signals.category)
    }
  };
}

function competitorSet(category){
  const sets = {
    'home cleaning': [
      ['The Better Home','search-based','Uses category bundles, refill logic, and eco-safe positioning to increase multi-product carts.'],
      ['Beco','search-based','Often frames value around family packs, subscriptions, and household routines.'],
      ['Born Good','search-based','Uses bundles and problem-led cleaning sets that can lift cart size beyond a single cleaner.']
    ],
    'beauty and personal care': [
      ['Plum','search-based','Strong routine bundles, minis, threshold gifts, and cart add-ons.'],
      ['Minimalist','search-based','Regimen-led cross-sell and concern-based product pairing.'],
      ['mCaffeine','search-based','Bundles, BOGO-style moments, and gift thresholds.']
    ],
    'nutrition and wellness': [
      ['HealthKart','search-based','Bulk packs, stack bundles, subscription prompts, and cart threshold rewards.'],
      ['Wellbeing Nutrition','search-based','Regimen packs and benefit-led kits.'],
      ['Oziva','search-based','Goal-based bundles and replenishment positioning.']
    ],
    'jewellery and accessories': [
      ['Mia by Tanishq','search-based','Occasion-led edits and gifting paths that raise basket intent.'],
      ['Giva','search-based','Gift bundles, add-on packaging, and occasion merchandising.'],
      ['CaratLane','search-based','Collection-led discovery and high-trust purchase reassurance.']
    ]
  };
  const rows = sets[category] || [];
  return rows.map(([name, confidence, tactics])=>({name, confidence, tactics}));
}

async function runAnalysis(){
  const inputs = {...state.inputs};
  state.error = '';
  state.notice = '';
  if(!inputs.brand || !inputs.pdp){
    state.error = 'Brand name and PDP link are both required.';
    render();
    return;
  }
  if(!isUrl(inputs.pdp) || (inputs.home && !isUrl(inputs.home)) || (inputs.collection && !isUrl(inputs.collection))){
    state.error = 'Use full http:// or https:// links.';
    render();
    return;
  }
  state.view = 'loading';
  const msgs = ['Fetching PDP...', 'Reading home page...', 'Reading collection page...', 'Extracting price, CTA and offer signals...', 'Researching 3 competitors...', 'Building AOV report...'];
  let i = 0;
  state.loadMsg = msgs[0];
  render();
  const timer = setInterval(()=>{ i=(i+1)%msgs.length; state.loadMsg = msgs[i]; render(); }, 1200);
  try{
    state.result = await callSupabaseReport(inputs);
    state.view = 'report';
  }catch(err){
    state.error = err.message || 'Could not generate report.';
    state.view = 'form';
  }finally{
    clearInterval(timer);
    render();
  }
}

async function callSupabaseReport(inputs){
  const res = await fetch(SUPABASE_ANALYZE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      brand_name: inputs.brand,
      pdp_url: inputs.pdp,
      home_url: inputs.home || undefined,
      collection_url: inputs.collection || undefined
    })
  });
  let data;
  try{ data = await res.json(); }
  catch(e){ throw new Error('Supabase returned a non-JSON response.'); }
  if(!res.ok){
    throw new Error(data.error || data.reason || 'Supabase report generation failed.');
  }
  if(!data.report || !Array.isArray(data.report.improvements)){
    throw new Error('Supabase returned an incomplete report.');
  }
  return {
    report_id: data.report_id,
    access_status: data.access_status,
    report: data.report
  };
}

function safeArray(value){
  if(Array.isArray(value)) return value;
  if(value && typeof value === 'object') return Object.values(value).filter(item => item && typeof item === 'object');
  return [];
}

function aovDiagnosisText(report, improvements){
  if(productSubtype() === 'ring') return `${state.inputs.brand}'s PDP should increase AOV through ring stacking, complete-look styling, gifting and care/storage add-ons rather than generic quantity discounts. The page needs a section that turns the product into a styled jewellery set or gift path before checkout.`;
  if(productSubtype() === 'earring') return `${state.inputs.brand}'s PDP should increase AOV by turning the earrings into a modular styling system: ear stacks, detachable backs, tennis-look sets, occasion gifts and post-add-to-cart completion. Generic quantity ladders are the wrong mechanic for this product type.`;
  const value = String(report.diagnosis || '').trim();
  if(value && /aov|average order|cart value|bundle|threshold|quantity|subscription|order bump|cart size|multi-item/i.test(value)) return value;
  const first = improvements[0] || {};
  const second = improvements[1] || {};
  return `${state.inputs.brand} needs an AOV-specific read: the priority is to identify whether the PDP, collection, and home page create a clear next-cart step beyond one item. Based on the returned suggestions, start with "${first.mechanism || first.title || 'a higher-value purchase path'}" and "${second.mechanism || second.title || 'a threshold or bundle mechanic'}", then validate every price, discount, stock, and offer claim against the fetched page content before using it in the report.`;
}

function ensureAovImprovements(items, report){
  const productIdeas = productSpecificAovIdeas();
  if(productIdeas.length) return productIdeas.map((item, idx)=>coerceAovImprovement(item, idx));
  const normalized = items.map((item, idx)=>coerceAovImprovement(item, idx)).filter(isAovMechanism);
  const seen = new Set(normalized.map(item => canonicalMechanism(item.mechanism || item.title)));
  fallbackAovMechanisms().forEach((item)=>{
    if(normalized.length >= 20) return;
    const key = canonicalMechanism(item.mechanism);
    if(seen.has(key)) return;
    normalized.push(item);
    seen.add(key);
  });
  return normalized.slice(0, 20);
}

function coerceAovImprovement(item, idx){
  const mechanism = item.mechanism || item.title || `AOV mechanism ${idx + 1}`;
  const applies = normalizeAppliesTo(item.applies_to || item.pageType || item.page || 'pdp');
  return {
    ...item,
    mechanism,
    title: item.title || mechanism,
    applies_to: applies,
    detail: item.detail || item.recommendation || item.problem || 'Validate this AOV mechanism against the fetched page before using it.',
    priority: item.priority || (idx < 5 ? 'High' : idx < 12 ? 'Medium' : 'Validation'),
    effort: item.effort || effortFor({ mechanism, detail: item.detail || item.recommendation || '' })
  };
}

function normalizeAppliesTo(value){
  const text = String(value || '').toLowerCase();
  if(text.includes('home')) return 'home';
  if(text.includes('collection') || text.includes('plp')) return 'collection';
  return 'pdp';
}

function isAovMechanism(item){
  const title = `${item.mechanism || ''} ${item.title || ''}`;
  const all = `${title} ${item.detail || ''} ${item.recommendation || ''}`;
  const coreAov = /aov|average order|bundle|quantity break|quantity ladder|multi-buy|tiered pricing|threshold|gift tier|gift-with-purchase|subscription|refill|replenishment|stock-up|multi-pack|kit|routine builder|routine bundle|cross-sell|upsell|add-on|addon|order bump|cart drawer|cart value|cart size|offer architecture|best-value|value ladder|attach rate|multi-item/i;
  const genericCROTitle = /breadcrumb|navigation|menu|photo|photography|gallery|image|specification|technical spec|stock availability|availability indicator|shipping information|delivery timeline|review aggregate|rating|faq|description|ingredient|benefit section/i;
  if(genericCROTitle.test(title) && !coreAov.test(title)) return false;
  return coreAov.test(all);
}

function canonicalMechanism(value){
  return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}

function productSubtype(){
  const text = `${state.inputs.brand || ''} ${state.inputs.pdp || ''} ${state.result?.access_status?.pdp?.title || ''}`.toLowerCase();

function hasProvidedPage(page){
  return page === 'home' ? Boolean(state.inputs.home) : page === 'collection' ? Boolean(state.inputs.collection) : Boolean(state.inputs.pdp);
}

function orderFallbacksByCategory(items){
  const text = `${state.inputs.brand || ''} ${state.inputs.pdp || ''} ${state.inputs.home || ''} ${state.inputs.collection || ''} ${state.result?.access_status?.pdp?.title || ''} ${state.result?.report?.diagnosis || ''}`.toLowerCase();
  let preferred = ['quantity break', 'bundle', 'threshold', 'order bump'];
  if(/clean|home|kitchen|laundry|floor|toilet|bathroom|dish|refill|limescale/.test(text)){
    preferred = ['refill', 'stock-up', 'best-value bundle', 'quantity break', 'threshold'];
  }else if(/earbud|headphone|speaker|watch|electronic|charger|boat|audio/.test(text)){
    preferred = ['add-on', 'cross-sell', 'upsell', 'cart drawer', 'kit', 'threshold'];
  }else if(/skin|beauty|serum|sunscreen|hair|makeup|cleanser|moistur/.test(text)){
    preferred = ['routine', 'subscription', 'bundle', 'gift', 'threshold'];
  }else if(/protein|supplement|vitamin|nutrition|wellness/.test(text)){
    preferred = ['subscription', 'stock-up', 'routine', 'bundle', 'threshold'];
  }else if(/ring|jewel|gift|necklace|bracelet|silver|gold|diamond/.test(text)){
    preferred = ['gift', 'cross-sell', 'kit', 'threshold', 'bundle'];
  }
  return [...items].sort((a,b)=>fallbackRank(a, preferred) - fallbackRank(b, preferred));
}

function fallbackRank(item, preferred){
  const text = `${item.mechanism || ''} ${item.detail || ''}`.toLowerCase();
  const hit = preferred.findIndex(term => text.includes(term));
  return hit === -1 ? 99 : hit;
}

function normalizeTests(value, improvements=[]){
  if(productSubtype()){
    return improvements.slice(0, 5).map((item, idx)=>({
      priority: idx + 1,
      test: `Test ${item.title || item.mechanism}`,
      why: item.reason || 'Measures AOV lift from a product-specific higher-value path.'
    }));
  }
  const rows = Array.isArray(value)
    ? value
    : value && typeof value === 'object'
      ? Object.values(value)
      : [];
  const normalized = rows.map((item, idx)=>{
    if(typeof item === 'string') return { priority: idx + 1, test: item, why: 'Validate with the rendered page before implementation.' };
    if(item && typeof item === 'object') return {
      priority: item.priority || idx + 1,
      test: item.test || item.title || item.name || `Validation test ${idx + 1}`,
      why: item.why || item.reason || item.detail || 'Validate with the rendered page before implementation.'
    };
    return null;
  }).filter(Boolean);
  if(normalized.length) return normalized.slice(0, 5);
  return improvements.slice(0, 5).map((item, idx)=>({
    priority: idx + 1,
    test: item.title || item.mechanism || `Suggestion ${idx + 1} validation`,
    why: item.reason || item.problem || 'Validate the recommendation against the rendered page before implementation.'
  }));
}

function normalizeCompetitors(value){
  const override = productSpecificCompetitors();
  if(override.length) return override;
  const rows = Array.isArray(value)
    ? value
    : value && typeof value === 'object'
      ? Object.entries(value).map(([name, detail]) => typeof detail === 'object' ? { name, ...detail } : { name, tactics: String(detail) })
      : [];
  return rows.map((item)=>{
    if(typeof item === 'string') return { name: item, confidence: 'search-based', tactics: 'Tactic details were not returned by the backend.' };
    if(item && typeof item === 'object') return {
      name: item.name || item.brand || 'Competitor',
      confidence: item.confidence || 'search-based',
      tactics: competitorTacticsText(item)
    };
    return null;
  }).filter(Boolean);
}

  const second = improvements[1] || {};
  const brand = state.inputs.brand || 'this brand';
  const firstSection = first.sectionName || first.affectedSection || 'primary purchase section';
  const secondSection = second.sectionName || second.affectedSection || 'supporting proof section';
  return `${brand} should lead the first viewport with the actual product/title context, verified price or a clear validation note, and the ${firstSection} improvement surfaced before the primary CTA. Directly below that, add the ${secondSection} support module so the shopper sees proof, availability, comparison, or offer logic before leaving the purchase area.`;
}

function offerArchitectureText(report, improvements){
  if(productSubtype() === 'ring') return 'Base: ring only. Better: ring plus one compatible stacker. Best: complete ring stack or complete jewellery look. Attach: premium gift upgrade, jewellery care kit, storage pair or expert stack appointment.';
  if(productSubtype() === 'earring') return 'Base: earrings only. Better: ear stack or detachable back. Best: complete tennis look or curated party set. Attach: gift packaging, care/storage kit, travel capsule or post-add-to-cart complete-your-ear drawer.';
  const value = String(report.offer_architecture || '').trim();
  if(value && !/^Validate offer rules before adding AOV mechanics/i.test(value)) return value;
  const pricing = improvements.find(item => /price|tier|bundle|offer|subscription|pack/i.test(`${item.title || ''} ${item.problem || ''} ${item.recommendation || ''}`));
  const proof = improvements.find(item => /review|proof|comparison|stock|availability|delivery/i.test(`${item.title || ''} ${item.problem || ''} ${item.recommendation || ''}`));
  const base = pricing
    ? `Base offer: keep the verified single purchase visible, then test "${pricing.title || pricing.mechanism}" only with confirmed SKU, price, and margin rules.`
    : 'Base offer: keep the verified single purchase path visible and avoid unverified bundle or discount claims.';
  const support = proof
    ? `Support it with "${proof.title || proof.mechanism}" near the CTA so the higher-value path has proof or reassurance.`
    : 'Support it with rendered-page proof, availability, and reassurance before adding new AOV mechanics.';
  return `${base} ${support}`;
}

      ])

function buildSuggestions(report){
  return ensureAovImprovements(safeArray(report.improvements), report).map((item, idx)=>{
    const backendReady = item.problem && item.recommendation && item.evidence && item.sectionType;
    const base = backendReady ? item : suggestionFromImprovement(item, idx);
    const evidence = normalizeEvidence(item.evidence, item, idx, report);
    const score = Number(item.opportunityScore) || opportunityScore(evidence, item, idx);
    return {
      id:item.id || `sug_${String(idx+1).padStart(3,'0')}`,
      title: item.title || base.title || item.mechanism,
      mechanism: item.mechanism || base.title,
      pageType: item.pageType || pageTypeLabel(item.applies_to),
      pageUrl: item.pageUrl || pageUrlFor(item.applies_to),
      sectionType: base.sectionType || sectionTypeFor(item.applies_to),
      sectionName: item.sectionName || base.sectionName || item.affectedSection || base.affectedSection || 'Conversion Section',
      affectedSection: item.affectedSection || item.sectionName || base.sectionName || 'Conversion Section',
      problem: item.problem || base.problem,
      detail: item.detail || item.recommendation || base.recommendation,
      recommendation: item.recommendation || base.recommendation || item.detail,
      reason: item.reason || base.reason || 'This creates a clearer path to a higher-value order using the evidence available from the submitted page.',
      evidence,
      priority: item.priority || (score >= 80 ? 'High' : score >= 65 ? 'Medium' : 'Validation'),
      effort: item.effort || base.effort || (idx < 5 ? 'Medium' : 'Low'),
      opportunityScore: score,
      expectedImpact: item.expectedImpact || {
        primaryMetric: item.applies_to === 'pdp' ? 'revenue_per_pdp_session' : 'average_order_value',
        secondaryMetric: item.applies_to === 'collection' ? 'revenue_per_collection_session' : 'revenue_per_pdp_session',
        confidence: evidence.status === 'observed' ? 'medium' : 'requires validation'
      },
      dependencies: Array.isArray(item.dependencies) ? item.dependencies : dependenciesFor(item, evidence),
      doNotInvent: item.doNotInvent || ['discount','shipping threshold','review count','rating','stock status','price'],
      wireframeEligible: item.wireframeEligible !== false,
      wireframeInstruction: item.wireframeInstruction || {
        generateOnly: componentsFor(item.applies_to, base.sectionType),
        exclude:['header','navigation','footer','full product gallery','reviews section','recommendation carousel','fake urgency','fake rating','invented shipping promise']
      }
    };
  });
}

function normalizeEvidence(raw, item, idx, report){
  const fallback = evidenceFor(item, idx, report);
  if(!raw || typeof raw !== 'object') return fallback;
  return {
    evidenceId: raw.evidenceId || fallback.evidenceId,
    status: raw.status === 'observed' ? 'observed' : 'hypothesis',
    requiresValidation: raw.requiresValidation !== false,
    observation: raw.observation || fallback.observation,
    source: {
      pageUrl: raw.source?.pageUrl || pageUrlFor(item.applies_to),
      pageTitle: raw.source?.pageTitle || null,
      text: raw.source?.text || report.diagnosis || item.detail || '',
      domSelector: raw.source?.domSelector || null,
      screenshot: raw.source?.screenshot || null
    },
    confidence: typeof raw.confidence === 'number' ? raw.confidence : fallback.confidence
  };
}

function suggestionFromImprovement(item, idx){
  const sectionType = specificSectionType(item);
  return {
    title:item.mechanism,
    sectionType,
    sectionName:sectionNameFor(sectionType),
    problem:problemFor(item),
    recommendation:item.detail,
    reason:reasonFor(item),
    priority:idx < 5 ? 'High' : 'Medium',
    effort:effortFor(item)
  };
}

function specificSectionType(item){
  const text = `${item.mechanism || ''} ${item.detail || ''}`.toLowerCase();
  if(text.includes('cart drawer') || text.includes('threshold')) return 'cart_threshold_area';
  if(text.includes('collection') || item.applies_to === 'collection') return 'collection_product_card';
  if(text.includes('home') || item.applies_to === 'home') return 'homepage_merchandising_section';
  if(text.includes('review')) return 'pdp_reviews_summary';
  if(text.includes('comparison')) return 'pdp_comparison_table';
  if(text.includes('sticky')) return 'pdp_sticky_add_to_cart';
  if(text.includes('delivery')) return 'pdp_delivery_checker';
  if(text.includes('bundle') || text.includes('quantity') || text.includes('subscription') || text.includes('order bump') || text.includes('refill')) return 'pdp_purchase_box';
  return sectionTypeFor(item.applies_to);
}

function sectionNameFor(type){
  return ({
    pdp_purchase_box:'PDP Purchase Box',
    cart_threshold_area:'Cart Threshold Area',
    collection_product_card:'Collection Product Card',
    homepage_merchandising_section:'Homepage Merchandising Section',
    pdp_reviews_summary:'Reviews Summary',
    pdp_comparison_table:'Comparison Table',
    pdp_sticky_add_to_cart:'Sticky Add To Cart',
    pdp_delivery_checker:'Delivery Checker'
  })[type] || 'Affected Section';
}

function problemFor(item){
  const detail = item.detail || 'The opportunity is visible in the supplied page read.';
  return `Current friction identified from the report: ${detail}`;
}

function reasonFor(item){
  if(item.applies_to === 'collection') return 'Collection improvements affect product discovery before the shopper reaches a PDP.';
  if(item.applies_to === 'home') return 'Homepage merchandising can route shoppers into higher-value product paths earlier.';
  return 'The PDP purchase area is where AOV mechanics must be visible before checkout intent drops.';
}

function effortFor(item){
  const text = `${item.mechanism || ''} ${item.detail || ''}`.toLowerCase();
  if(text.includes('backend') || text.includes('subscription') || text.includes('cart drawer')) return 'High';
  if(text.includes('module') || text.includes('table') || text.includes('bundle')) return 'Medium';
  return 'Low';
}

function evidenceFor(item, idx, report){
  const hasAccess = Object.values(state.result?.access_status || {}).some(v => v.status === 'fetched' || v.status === 'partial');
  const status = hasAccess ? 'hypothesis' : 'hypothesis';
  const confidence = hasAccess ? (idx < 4 ? 0.72 : 0.66) : 0.5;
  return {
    evidenceId:`ev_${String(idx+1).padStart(3,'0')}`,
    status,
    requiresValidation:true,
    observation:`The supplied page read supports an AOV strategy review, but exact DOM position, screenshots, and commercial values require rendered-page validation before implementation.`,
    source:{
      pageUrl: pageUrlFor(item.applies_to),
      text: report.diagnosis || item.detail || '',
      domSelector:null,
      screenshot:null
    },
    confidence
  };
}

function opportunityScore(evidence, item, idx){
  const evidenceConfidence = Math.round(evidence.confidence * 20);
  const relevance = 18;
  const impact = idx < 4 ? 17 : 14;
  const fit = 12;
  const feasibility = effortFor(item) === 'High' ? 9 : effortFor(item) === 'Medium' ? 12 : 14;
  const completeness = evidence.status === 'observed' ? 9 : 6;
  return Math.max(65, Math.min(92, evidenceConfidence + relevance + impact + fit + feasibility + completeness));
}

function dependenciesFor(item, evidence){
  const deps = [];
  const text = `${item.mechanism || ''} ${item.detail || ''}`.toLowerCase();
  if(text.includes('bundle') || text.includes('quantity')) deps.push('Confirm product combinations, inventory and pricing before launch');
  if(text.includes('threshold') || text.includes('free shipping')) deps.push('Confirm actual free-shipping or reward threshold');
  if(text.includes('subscription')) deps.push('Confirm subscription app or replenishment infrastructure');
  if(evidence.requiresValidation) deps.push('Validate with rendered screenshot and current section DOM');
  return deps;
}

function componentsFor(pageType, sectionType){
  if(sectionType === 'cart_threshold_area') return ['confirmed threshold when available','cart progress state','one verified add-on when available','checkout CTA context'];
  if(sectionType === 'collection_product_card') return ['actual product card content','product name','price when available','badge when observed','quick add when present'];
  if(sectionType === 'homepage_merchandising_section') return ['section heading','problem or product cards','short supporting copy','CTA'];
  return ['product title when available','price when available','verified offer or validation note','primary CTA','implementation note'];
}

function pageTypeLabel(value){
  return value === 'home' ? 'Homepage' : value === 'collection' ? 'Collection Page' : 'Product Page';
}

function pageUrlFor(value){
  if(value === 'home') return state.inputs.home || domainName(state.inputs.pdp);
  if(value === 'collection') return state.inputs.collection || domainName(state.inputs.pdp);
  return state.inputs.pdp;
}

function sectionTypeFor(value){
  if(value === 'home') return 'homepage_offer_module';
  if(value === 'collection') return 'collection_product_grid';
  return 'pdp_purchase_box';
}

async function copyShareLink(){

async function openWireframe(suggestion){
  state.viewport = 'desktop';
  state.modal = {
    suggestion,
    html: '',
    loading:true
  };
  render();
  try{
    const html = await callClaudeWireframe(suggestion);
    state.modal = { suggestion, html: html || generateWireframeHtml(suggestion), loading:false };
  }catch(err){
    state.modal = { suggestion, html: generateWireframeHtml(suggestion), loading:false };
    state.notice = 'Claude section generation was limited, so a local evidence-backed fallback was shown.';
  }
  render();
}

function closeWireframe(){
  state.modal = null;
  render();
}

function wireframeModal(){

function setViewport(viewport){
  state.viewport = viewport;
  if(state.modal && state.modal.html && state.modal.html.includes('data-claude-wireframe="true"')){
    state.modal.html = state.modal.html.replace(/data-viewport="(desktop|mobile|compare)"/, `data-viewport="${viewport}"`);
  }else if(state.modal){
    state.modal.html = generateWireframeHtml(state.modal.suggestion);
  }
  render();
}

async function callClaudeWireframe(suggestion){
  const res = await fetch(SUPABASE_ANALYZE_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:'generate_wireframe',
      brand_name:state.inputs.brand,
      pdp_url:state.inputs.pdp,
      home_url:state.inputs.home || undefined,
      collection_url:state.inputs.collection || undefined,
      viewport:state.viewport,
      suggestion,
      brand_tokens:brandTokens(),
      verified_data:verifiedData(),
      report_context:{
        diagnosis:state.result?.report?.diagnosis,
        above_fold_structure:state.result?.report?.above_fold_structure,
        offer_architecture:state.result?.report?.offer_architecture
      }
    })
  });
  const data = await res.json();
  if(!res.ok || !data.html) throw new Error(data.error || 'Claude wireframe failed');
  return data.html;
}

function brandTokens(){
  const backend = state.result?.report?.brand_tokens;
  if(backend && backend.primary_color){
    return {
      primary_color: normalizeToken(backend.primary_color, '#1f2933'),
      secondary_color: normalizeToken(backend.secondary_color, '#f7f7f4'),
      accent_color: normalizeToken(backend.accent_color, '#8a6cf5'),
      background_color: normalizeToken(backend.background_color, '#ffffff'),
      text_color: normalizeToken(backend.text_color, '#161616'),
      heading_font: normalizeToken(backend.heading_font, 'system sans-serif'),
      body_font: normalizeToken(backend.body_font, 'system sans-serif'),
      border_radius: backend.border_radius || '8px',
      button_radius: backend.button_radius || '8px',
      button_style: backend.button_style || 'solid brand-colour CTA',
      shadow_style: backend.shadow_style || 'none unless observed',
      container_width: backend.container_width || '1120px',
      logo_url: backend.logo_url || '',
      icon_style: backend.icon_style || 'minimal line icons',
      product_image_style: backend.product_image_style || 'use actual product imagery only when extracted',
      raw_tokens_json: backend.raw_tokens_json || { source:'backend brand token extractor' }
    };
  }
  const domain = domainName(state.inputs.pdp || state.inputs.home || '');
  const natural = /happi|planet|eco|clean|better|beco|born/i.test(`${state.inputs.brand} ${domain}`);
  const beauty = /minimal|beauty|skin|plum|mcaffeine/i.test(`${state.inputs.brand} ${domain}`);
  const palette = natural
    ? { primary:'#244b3b', secondary:'#f7f3ea', accent:'#d49a3a', background:'#fffaf2', text:'#17211d' }
    : beauty
      ? { primary:'#111111', secondary:'#fafafa', accent:'#7c5cff', background:'#ffffff', text:'#161616' }
      : { primary:'#1f2933', secondary:'#f7f7f4', accent:'#8a6cf5', background:'#ffffff', text:'#161616' };
  return {
    primary_color:{value:palette.primary,source:'domain_and_page_text_estimate',confidence:.62},
    secondary_color:{value:palette.secondary,source:'domain_and_page_text_estimate',confidence:.58},
    accent_color:{value:palette.accent,source:'domain_and_page_text_estimate',confidence:.58},
    background_color:{value:palette.background,source:'domain_and_page_text_estimate',confidence:.6},
    text_color:{value:palette.text,source:'domain_and_page_text_estimate',confidence:.62},
    heading_font:{value:'system sans-serif',source:'fallback_until_rendered_styles_available',confidence:.45},
    body_font:{value:'system sans-serif',source:'fallback_until_rendered_styles_available',confidence:.45},
    border_radius:'8px',
    button_radius:'8px',
    button_style:'solid brand-colour CTA',
    shadow_style:'none unless observed',
    container_width:'1120px',
    logo_url:'',
    icon_style:'minimal line icons',
    product_image_style:'use actual product imagery only when extracted',
    raw_tokens_json:{ source:'estimated from supplied URL/domain; needs rendered style extraction for production' }
  };
}

function normalizeToken(token, fallback){
  if(token && typeof token === 'object') return { value: token.value || fallback, source: token.source || 'backend', confidence: Number(token.confidence) || .5 };
  return { value: token || fallback, source:'backend', confidence:.5 };
}

  #troo-section-${sug.id} .badgeRow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.badge{border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;background:rgba(255,255,255,.5)}
  #troo-section-${sug.id} .statusGrid,.tierGrid,.reviewGrid,.specGrid,.galleryGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:14px 0}
  #troo-section-${sug.id} .statusCard,.tier,.review,.spec,.galleryCell{border:1px solid var(--line);border-radius:${tokens.border_radius};padding:14px;background:rgba(255,255,255,.58)}
  #troo-section-${sug.id} .tier.selected,.statusCard.selected{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
  #troo-section-${sug.id} .tier strong,.statusCard strong,.spec strong,.review strong{display:block;margin-bottom:4px}
  #troo-section-${sug.id} .cta{width:100%;border:0;border-radius:${tokens.button_radius};padding:15px;background:var(--primary);color:white;font-weight:900;margin-top:12px}
  #troo-section-${sug.id} .secondaryCta{width:100%;border:1px solid var(--line);border-radius:${tokens.button_radius};padding:13px;background:transparent;color:var(--text);font-weight:800;margin-top:8px}
  #troo-section-${sug.id} .compareTable{width:100%;border-collapse:collapse;margin-top:14px}.compareTable th,.compareTable td{border:1px solid var(--line);padding:12px;text-align:left;vertical-align:top}.compareTable th{background:rgba(0,0,0,.04)}
  #troo-section-${sug.id} .note{border:1px dashed var(--accent);border-radius:${tokens.border_radius};padding:12px;color:var(--muted);background:rgba(0,0,0,.03);margin-top:12px}
  #troo-section-${sug.id} .current{background:#f6f6f4;border:1px solid var(--line);border-radius:${tokens.border_radius};padding:18px;color:#333;line-height:1.5}
  @media(max-width:720px){body{padding:12px}#troo-section-${sug.id} .comparison,#troo-section-${sug.id} .purchaseShell,#troo-section-${sug.id} .statusGrid,#troo-section-${sug.id} .tierGrid,#troo-section-${sug.id} .reviewGrid,#troo-section-${sug.id} .specGrid,#troo-section-${sug.id} .galleryGrid{grid-template-columns:1fr}#troo-section-${sug.id} h1{font-size:23px}}
</style>
</head>
<body>
  <main id="troo-section-${sug.id}">
    <div class="comparison">
      ${comparePanel}
      ${actualSection}
    </div>
  </main>
</body>
</html>`;
}

function renderActualSection(sug, verified, brand){
  const kind = sectionKind(sug);
  const title = escapeHtml(sug.title);
  const sectionName = escapeHtml(sug.sectionName);
  const recommendation = escapeHtml(sug.recommendation);
  const context = escapeHtml(sug.evidence.observation || sug.problem);
  const price = verified.prices[0] || '';
  const priceHtml = price
    ? `<div class="price">${escapeHtml(price)}</div><div class="source">Verified from public read; confirm SKU mapping.</div>`
    : `<div class="note">Price unavailable in public read; keep price hidden until rendered validation confirms it.</div>`;
  const note = `<div class="note">Implementation note: ${escapeHtml((sug.dependencies || [])[0] || 'Validate rendered DOM, copy, pricing and offer rules before launch.')}</div>`;
  const shellOpen = `<section class="actual" data-section-type="${escapeHtml(sug.sectionType)}" aria-label="${sectionName}"><div><div class="eyebrow">${escapeHtml(brand)} · ${sectionName}</div><h1>${title}</h1><p class="summary">${recommendation}</p><div class="context"><strong>Section context:</strong> ${context}</div></div>`;
  const productMedia = `<div class="mediaPanel"><div class="mediaMock">${escapeHtml(verified.productName || brand)}<br><span style="font-size:12px;color:var(--muted)">Use actual brand imagery from the section</span></div><div class="thumbs"><span></span><span></span><span></span><span></span></div></div>`;
  if(kind === 'stock'){
    return `${shellOpen}<div class="purchaseShell">${productMedia}<div class="panel">${priceHtml}<div class="badgeRow"><span class="badge">Inventory badge</span><span class="badge">Fulfilment timeline</span><span class="badge">Delivery promise</span></div><div class="statusGrid"><div class="statusCard selected"><strong>In stock state</strong><span>Show only after inventory feed validates availability.</span></div><div class="statusCard"><strong>Dispatch state</strong><span>Use real fulfilment SLA, not a guessed shipping promise.</span></div></div><button class="cta">${ctaFor(sug)}</button><button class="secondaryCta">Check delivery details</button>${note}</div></div></section>`;
  }
  if(kind === 'pricing'){
    return `${shellOpen}<div class="purchaseShell">${productMedia}<div class="panel">${priceHtml}<div class="tierGrid"><div class="tier selected"><strong>Single unit</strong><span>${price ? escapeHtml(price) : 'Validated price required'}</span></div><div class="tier"><strong>Higher-value option</strong><span>Use real quantity, bundle or subscription rule only when confirmed.</span></div><div class="tier"><strong>Routine pack</strong><span>Map to actual SKU set before launch.</span></div><div class="tier"><strong>Best-value callout</strong><span>No fake savings; show real math only.</span></div></div><button class="cta">${ctaFor(sug)}</button>${note}</div></div></section>`;
  }
  if(kind === 'comparison'){
    return `${shellOpen}<div class="panel"><table class="compareTable"><thead><tr><th>Decision point</th><th>${escapeHtml(brand)}</th><th>Alternative</th></tr></thead><tbody><tr><td>Proof</td><td>${context}</td><td>Use only verified competitor claims.</td></tr><tr><td>Offer</td><td>${price ? escapeHtml(price) : 'Price requires validation'}</td><td>No invented discounts or thresholds.</td></tr><tr><td>CTA</td><td>${escapeHtml(sug.recommendation)}</td><td>Keep section scoped, not a full-page redesign.</td></tr></tbody></table>${note}</div></section>`;
  }
  if(kind === 'reviews'){
    return `${shellOpen}<div class="panel"><div class="reviewGrid"><div class="review"><strong>Review summary module</strong><span>Use actual rating/review count only when present in rendered page.</span></div><div class="review"><strong>Verified buyer proof</strong><span>${context}</span></div><div class="review"><strong>Media review slot</strong><span>Pull real customer media if available.</span></div><div class="review"><strong>Objection answer</strong><span>Map review themes to purchase anxiety.</span></div></div><button class="cta">Use review proof near CTA</button>${note}</div></section>`;
  }
  if(kind === 'details'){
    return `${shellOpen}<div class="purchaseShell">${productMedia}<div class="panel"><div class="specGrid"><div class="spec"><strong>What it is</strong><span>${context}</span></div><div class="spec"><strong>Size / quantity</strong><span>Show verified pack size only.</span></div><div class="spec"><strong>Ingredients / materials</strong><span>Use actual brand copy from PDP.</span></div><div class="spec"><strong>How to use</strong><span>Keep steps short and section-scoped.</span></div></div><button class="cta">Add details to purchase section</button>${note}</div></div></section>`;
  }
  if(kind === 'gallery'){
    return `${shellOpen}<div class="panel"><div class="galleryGrid"><div class="galleryCell">Hero product shot</div><div class="galleryCell">Use-case visual</div><div class="galleryCell">Before / after or benefit proof</div><div class="galleryCell">Scale, pack or ingredient visual</div></div><div class="note">Replace all cells with actual brand assets from the PDP/gallery. Do not use stock placeholders in production.</div><button class="cta">Apply gallery section</button></div></section>`;
  }
  if(kind === 'collection'){
    return `${shellOpen}<div class="panel"><div class="tierGrid"><div class="tier selected"><strong>${escapeHtml(verified.productName || sug.title)}</strong><span>${price || 'Validated price required'}</span><button class="cta">Quick add</button></div><div class="tier"><strong>Value badge area</strong><span>Use real pack, offer or proof badge only.</span></div></div>${note}</div></section>`;
  }
  return `${shellOpen}<div class="purchaseShell">${productMedia}<div class="panel">${priceHtml}<div class="statusGrid"><div class="statusCard selected"><strong>${sectionName}</strong><span>${context}</span></div><div class="statusCard"><strong>Improved action</strong><span>${recommendation}</span></div></div><button class="cta">${ctaFor(sug)}</button>${note}</div></div></section>`;
}

function sectionKind(sug){
  const text = `${sug.title} ${sug.sectionName} ${sug.sectionType} ${sug.problem} ${sug.recommendation}`.toLowerCase();
  if(/stock|inventory|availability|shipping|delivery|fulfil/.test(text)) return 'stock';
  if(/price|pricing|tier|bundle|discount|subscription|quantity|pack|offer/.test(text)) return 'pricing';
  if(/comparison|compare|competitor|versus|vs\\.?/.test(text)) return 'comparison';
  if(/review|rating|testimonial|social proof|proof/.test(text)) return 'reviews';
  if(/ingredient|spec|detail|size|quantity|safety|how to use|usage|material/.test(text)) return 'details';
  if(/image|gallery|visual|photo|media|before after/.test(text) || text.includes('before/after')) return 'gallery';
  if(/collection|card|grid|quick add/.test(text)) return 'collection';
  return 'purchase';
}

function verifiedData(){
  const report = state.result?.report || {};
  const access = state.result?.access_status || {};
  const text = reportText();
  const prices = Array.from(new Set((text.match(/(?:₹\s?[\d,]+(?:\.\d{1,2})?|rs\.?\s?[\d,]+(?:\.\d{1,2})?|inr\s?[\d,]+(?:\.\d{1,2})?|\$\s?[\d,]+(?:\.\d{1,2})?)/gi) || [])
    .map(price => price.replace(/[,\s]+$/g, '').trim())
    .filter(price => /\d/.test(price))
    .slice(0, 6)));
  const rawTitle = access.pdp?.title || '';
  const pdpTitle = /404|not found|access denied|forbidden/i.test(rawTitle) ? (state.inputs.brand || '') : cleanPageTitle(rawTitle);
  const offers = prices.slice(0, 4).map((price, idx)=>({
    label: idx === 0 ? (pdpTitle || 'Observed public price signal') : `Observed public price signal ${idx + 1}`,
    price
  }));
  return {
    productName: pdpTitle,
    prices,
    offers,
    rating:null,
    reviewCount:null,
    shippingThreshold:null,
    images:[]
  };
}

function reportText(){
  const report = state.result?.report || {};
  const parts = [report.diagnosis, report.above_fold_structure, report.offer_architecture];
  safeArray(report.improvements).forEach(item => parts.push(item.title, item.mechanism, item.problem, item.detail, item.recommendation, item.reason, item.evidence?.observation, item.evidence?.source?.text));
  return parts.filter(Boolean).join(' ');
}

function cleanPageTitle(value){
  return String(value || '')
    .replace(/\s*URL Source:[\s\S]*$/i, '')
    .replace(/\s*Markdown Content:[\s\S]*$/i, '')
    .trim()
    .slice(0, 140);
}

function ctaFor(sug){
  if(sug.sectionType === 'collection_product_card') return 'Apply to product card';
  if(sug.sectionType === 'homepage_merchandising_section') return 'Apply merchandising section';
  if(sug.sectionType === 'cart_threshold_area') return 'Apply cart section';
  return 'Apply purchase section';
}

function fidelityScore(sug){
  const verified = verifiedData();
  const realData = verified.prices.length ? 18 : 10;
  const brand = brandTokens().primary_color.confidence * 15;
  const scope = 10;
  const recommendation = 15;
  const accessibility = 5;
  const continuity = sug.evidence.requiresValidation ? 9 : 14;
  return Math.round(Math.min(91, brand + 8 + 8 + continuity + realData + recommendation + scope + accessibility));
}

function designRationale(sug){
  const tokens = brandTokens();
  const verified = verifiedData();
  const dataNote = verified.prices.length
    ? `Uses observed price signal ${verified.prices[0]}.`
    : 'Omits price, rating, review and shipping claims because they were not verified in the public read.';
  return `${dataNote} Colour and typography are marked as estimated (${Math.round(tokens.primary_color.confidence * 100)}% confidence) until rendered CSS extraction is available. The output is scoped to ${sug.sectionName} and excludes header, footer, reviews list and unrelated product gallery content.`;
}

function downloadWireframeHtml(sug){
  const blob = new Blob([state.modal?.html || generateWireframeHtml(sug)], { type:'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${sug.id}-${slugify(sug.title)}.html`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 500);
}

async function copyDeveloperPrompt(sug){
  const prompt = {
    role: 'Senior ecommerce AOV strategy designer',
    task: 'Generate ONLY the improved affected section, not a full page. Match the submitted brand page visual system and use the current section context as the source of truth.',
    suggestion: sug,
    brand_tokens: brandTokens(),
    source_context: {
      brand: state.inputs.brand,
      page_url: sug.pageUrl,
      page_title: sug.evidence.source?.pageTitle || state.result?.access_status?.pdp?.title || '',
      evidence: sug.evidence,
      verified_data: verifiedData()
    },
    output_requirements: [
      'Return responsive HTML and scoped CSS only.',
      'Use the actual affected section type: pricing, stock/CTA, comparison table, reviews, specs/details, gallery, collection card, or purchase box.',
      'Preserve the existing site header, navigation, footer, full product gallery, reviews list, and recommendation carousel unless the affected section is specifically one of those.',
      'Do not invent discounts, review counts, ratings, stock state, delivery promise, price, ingredients, claims, or competitor facts.',
      'If a value is not verified, render a validation note in the UI rather than fake content.',
      'Desktop and mobile must both look like production UI, not a wireframe sketch.'
    ]
  };
  await navigator.clipboard.writeText(JSON.stringify(prompt, null, 2));
  state.notice = 'Developer prompt copied.';
  render();
}

function slugify(value){return value.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')}
function escapeHtml(value){return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}

function downloadPdf(){
  const node = document.getElementById('reportPrintArea');
  if(!window.html2pdf){ window.print(); return; }
  const brand = (state.inputs.brand || 'brand').toLowerCase().replace(/[^a-z0-9]+/g,'-');
  window.html2pdf().set({
    margin:10,
    filename:`troo-aov-strategy-${brand}.pdf`,
    image:{type:'jpeg',quality:.98},
    html2canvas:{scale:2,backgroundColor:'#0a0a0d'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(node).save();
}

loadSharedReport();
window.addEventListener('hashchange', () => {
  if(loadSharedReport()) render();
});
render();
</script>
</body>
